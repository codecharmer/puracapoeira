name: Deploy Static Site to VPS

on:
  push:
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: production-deploy
  # Never cancel an in-flight deploy: rsync uploads files one by one, so a
  # cancelled run leaves the server in a partial state (e.g. new assets but
  # stale HTML). Queue overlapping runs instead so each deploy completes.
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static HTML
    runs-on: ubuntu-latest
    # Fail fast if a step hangs (e.g. a stalled rsync over a dead SSH
    # connection) so a stuck run can't block queued deploys for hours.
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "whoami && hostname"

      - name: Deploy public folder
        run: |
          rsync -az --delete --partial --timeout=60 \
            --exclude='.well-known/' \
            --exclude='.htaccess' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -p ${{ secrets.SSH_PORT }}" \
            public/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Fix ownership and permissions
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "chown -R puracapoeirasite:puracapoeirasite '${{ secrets.DEPLOY_PATH }}' && find '${{ secrets.DEPLOY_PATH }}' -type d -exec chmod 755 {} \; && find '${{ secrets.DEPLOY_PATH }}' -type f -exec chmod 644 {} \;"
